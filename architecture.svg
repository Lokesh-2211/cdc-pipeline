<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>

  <!-- Postgres box -->
  <rect x="30" y="110" width="160" height="100" rx="8" fill="#336791" stroke="#264a68" stroke-width="2"/>
  <text x="110" y="150" fill="white" font-size="16" font-weight="bold" text-anchor="middle">PostgreSQL</text>
  <text x="110" y="172" fill="white" font-size="12" text-anchor="middle">orders table</text>
  <text x="110" y="190" fill="white" font-size="11" text-anchor="middle">(WAL enabled)</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="160" x2="270" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="145" font-size="11" text-anchor="middle" fill="#333">reads WAL</text>

  <!-- Debezium box -->
  <rect x="270" y="110" width="160" height="100" rx="8" fill="#e8622c" stroke="#b84a1f" stroke-width="2"/>
  <text x="350" y="150" fill="white" font-size="16" font-weight="bold" text-anchor="middle">Debezium</text>
  <text x="350" y="172" fill="white" font-size="12" text-anchor="middle">Kafka Connect</text>
  <text x="350" y="190" fill="white" font-size="11" text-anchor="middle">source connector</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="160" x2="510" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="145" font-size="11" text-anchor="middle" fill="#333">publishes</text>

  <!-- Redpanda box -->
  <rect x="510" y="110" width="160" height="100" rx="8" fill="#e6362e" stroke="#a8241d" stroke-width="2"/>
  <text x="590" y="145" fill="white" font-size="16" font-weight="bold" text-anchor="middle">Redpanda</text>
  <text x="590" y="167" fill="white" font-size="12" text-anchor="middle">cdc.public.orders</text>
  <text x="590" y="187" fill="white" font-size="11" text-anchor="middle">topic</text>

  <!-- Arrow 3 -->
  <line x1="670" y1="160" x2="750" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="710" y="145" font-size="11" text-anchor="middle" fill="#333">view</text>

  <!-- Console box -->
  <rect x="750" y="110" width="130" height="100" rx="8" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="2"/>
  <text x="815" y="150" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Redpanda</text>
  <text x="815" y="168" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Console</text>
  <text x="815" y="188" fill="white" font-size="10" text-anchor="middle">web UI</text>

  <!-- pgAdmin annotation -->
  <line x1="110" y1="110" x2="110" y2="60" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="110" y="45" font-size="11" text-anchor="middle" fill="#666">managed via pgAdmin</text>

  <!-- Bottom labels: operation types -->
  <text x="450" y="260" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Every INSERT / UPDATE / DELETE becomes a structured event</text>
  <text x="450" y="282" font-size="11" text-anchor="middle" fill="#666">op: "c" (create)   op: "u" (update)   op: "d" (delete)   op: "r" (snapshot read)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
